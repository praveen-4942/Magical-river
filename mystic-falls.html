<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Diary</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920&auto=format&fit=crop') center/cover fixed no-repeat;
  color:white;
  min-height:100vh;
}

.overlay{
  min-height:100vh;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(6px);
  display:flex;
}

.sidebar{
  width:85px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(8px);
  padding:15px 10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  height:100vh;
}

.side-btn{
  width:60px;
  height:60px;
  border:none;
  border-radius:18px;
  background:rgba(255,255,255,0.12);
  color:white;
  cursor:pointer;
  font-size:0.7rem;
  transition:0.3s;
  text-align:center;
}

.side-btn:hover{
  transform:scale(1.08);
  background:rgba(255,255,255,0.22);
}

.today-btn{
  background:#ffd68f55;
}

.main{
  flex:1;
  padding:20px;
}

h1{
  text-align:center;
  font-size:2.5rem;
  margin-top:10px;
}

.quote{
  text-align:center;
  margin:15px auto 20px;
  max-width:700px;
  opacity:0.9;
  font-style:italic;
}

#title{
  text-align:center;
  margin-bottom:20px;
}

.calendar-header,
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
  max-width:1200px;
  margin:auto;
}

.day-name{
  background:#ffffff15;
  text-align:center;
  padding:10px;
  border-radius:10px;
}

.day{
  min-height:110px;
  background:#ffffff10;
  border-radius:16px;
  padding:10px;
  border:1px solid #ffffff15;
  overflow:hidden;
  transition:0.3s;
  cursor:pointer;
}

.day:hover{
  transform:scale(1.03);
}

.future-day{
  opacity:0.3;
  cursor:not-allowed;
}

.today-highlight{
  border:2px solid #ffd68f;
}

.has-entry{
  border:2px solid #8fffd1;
  box-shadow:0 0 12px rgba(143,255,209,0.4);
}

.preview{
  width:100%;
  height:55px;
  object-fit:cover;
  border-radius:10px;
  margin-top:8px;
}

.year-view{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  max-width:1300px;
  margin:auto;
}

.month-card{
  background:#ffffff10;
  border-radius:18px;
  padding:15px;
}

.month-mini{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  margin-top:10px;
}

.month-mini div{
  text-align:center;
  padding:5px;
  background:#ffffff10;
  border-radius:6px;
  font-size:0.8rem;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.82);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  padding:15px;
}

.modal-content{
  width:100%;
  max-width:900px;
  max-height:92vh;
  overflow:auto;
  background:#111111ee;
  border-radius:24px;
  padding:25px;
}

textarea{
  width:100%;
  min-height:250px;
  margin-top:15px;
  border:none;
  border-radius:16px;
  background:#ffffff10;
  color:white;
  padding:15px;
  resize:vertical;
}

input[type=file]{
  margin-top:15px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:10px;
  margin-top:15px;
}

.gallery img{
  width:100%;
  height:130px;
  object-fit:cover;
  border-radius:12px;
}

.modal-btns{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.modal-btns button{
  border:none;
  padding:10px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

@media(max-width:768px){

  .overlay{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:auto;
    flex-direction:row;
    justify-content:center;
    position:relative;
    padding:10px;
    overflow-x:auto;
  }

  .side-btn{
    width:55px;
    height:55px;
    font-size:0.65rem;
    flex-shrink:0;
  }

  h1{
    font-size:2rem;
  }

  .calendar-header,
  .calendar{
    gap:6px;
  }

  .day{
    min-height:80px;
    font-size:0.75rem;
  }

  .preview{
    height:35px;
  }
}

</style>
</head>

<body>

<div class="overlay">

<div class="sidebar">

<button class="side-btn" onclick="changeMonth(-1)">⬅<br>Prev</button>

<button class="side-btn today-btn" onclick="goToday()">📍<br>Today</button>

<button class="side-btn" onclick="changeMonth(1)">➡<br>Next</button>

<button class="side-btn" onclick="setView('month')">📅<br>Month</button>

<button class="side-btn" onclick="setView('week')">🗓️<br>Week</button>

<button class="side-btn" onclick="setView('year')">📖<br>Year</button>

</div>

<div class="main">

<h1>🌙 Mystic Diary</h1>

<div class="quote" id="quote"></div>

<h2 id="title"></h2>

<div id="content"></div>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<h2 id="dateTitle"></h2>

<textarea id="diaryText" placeholder="Write your thoughts..."></textarea>

<input type="file" id="imageInput" multiple accept="image/*">

<div class="gallery" id="gallery"></div>

<div class="modal-btns">

<button style="background:#8fffd1;" onclick="saveDiary()">Save</button>

<button style="background:#ffd68f;" onclick="deleteDiary()">Delete</button>

<button style="background:#ff8f8f;" onclick="closeModal()">Close</button>

</div>

</div>

</div>

<script>

const quotes=[
"Every memory deserves a place.",
"The moon remembers everything.",
"Write your heart softly.",
"Moments become memories.",
"Your story matters.",
"Rain understands silence.",
"Every day becomes history.",
"Memories never truly fade.",
"Quiet moments are beautiful.",
"The night listens carefully."
];

document.getElementById("quote").innerText=
quotes[Math.floor(Math.random()*quotes.length)];

let currentDate=new Date();
let currentView="month";

const content=document.getElementById("content");

function setView(view){

  currentView=view;

  render();
}

function changeMonth(direction){

  currentDate.setMonth(currentDate.getMonth()+direction);

  render();
}

function goToday(){

  currentDate=new Date();

  render();
}

function isFuture(year,month,day){

  const today=new Date();

  return new Date(year,month,day)>today;
}

function render(){

  if(currentView==="month"){
    renderMonth();
  }
  else if(currentView==="week"){
    renderWeek();
  }
  else{
    renderYear();
  }
}

function renderMonth(){

  content.innerHTML="";

  const year=currentDate.getFullYear();
  const month=currentDate.getMonth();

  document.getElementById("title").innerText=
  currentDate.toLocaleString('default',{
    month:'long',
    year:'numeric'
  });

  const header=document.createElement("div");
  header.className="calendar-header";

  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(day=>{

    const d=document.createElement("div");

    d.className="day-name";

    d.innerText=day;

    header.appendChild(d);
  });

  content.appendChild(header);

  const cal=document.createElement("div");

  cal.className="calendar";

  const firstDay=new Date(year,month,1).getDay();

  const totalDays=new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++){

    cal.appendChild(document.createElement("div"));
  }

  const today=new Date();

  for(let day=1;day<=totalDays;day++){

    const key=`${year}-${month+1}-${day}`;

    const entry=JSON.parse(localStorage.getItem(key));

    const div=document.createElement("div");

    div.className="day";

    const future=isFuture(year,month,day);

    if(future){
      div.classList.add("future-day");
    }

    if(entry){
      div.classList.add("has-entry");
    }

    if(
      day===today.getDate() &&
      month===today.getMonth() &&
      year===today.getFullYear()
    ){
      div.classList.add("today-highlight");
    }

    div.innerHTML=`<strong>${day}</strong>`;

    if(entry && entry.images && entry.images.length){

      const img=document.createElement("img");

      img.src=entry.images[0];

      img.className="preview";

      div.appendChild(img);
    }

    if(!future){

      div.onclick=()=>openModal(key,day,month,year);
    }

    cal.appendChild(div);
  }

  content.appendChild(cal);
}

function renderWeek(){

  content.innerHTML="";

  document.getElementById("title").innerText="Weekly View";

  const week=document.createElement("div");

  week.className="calendar";

  const start=new Date(currentDate);

  start.setDate(currentDate.getDate()-currentDate.getDay());

  for(let i=0;i<7;i++){

    const d=new Date(start);

    d.setDate(start.getDate()+i);

    const key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;

    const entry=JSON.parse(localStorage.getItem(key));

    const div=document.createElement("div");

    div.className="day";

    if(d>new Date()){
      div.classList.add("future-day");
    }

    if(entry){
      div.classList.add("has-entry");
    }

    div.innerHTML=`<strong>${d.getDate()}</strong><br>${d.toLocaleDateString()}`;

    if(entry && entry.images && entry.images.length){

      const img=document.createElement("img");

      img.src=entry.images[0];

      img.className="preview";

      div.appendChild(img);
    }

    if(d<=new Date()){

      div.onclick=()=>openModal(
        key,
        d.getDate(),
        d.getMonth(),
        d.getFullYear()
      );
    }

    week.appendChild(div);
  }

  content.appendChild(week);
}

function renderYear(){

  content.innerHTML="";

  const year=currentDate.getFullYear();

  document.getElementById("title").innerText=`Year ${year}`;

  const wrap=document.createElement("div");

  wrap.className="year-view";

  const months=[
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
  ];

  months.forEach((month,index)=>{

    const card=document.createElement("div");

    card.className="month-card";

    card.innerHTML=`<h3>${month}</h3>`;

    const mini=document.createElement("div");

    mini.className="month-mini";

    const total=new Date(year,index+1,0).getDate();

    for(let d=1;d<=total;d++){

      const key=`${year}-${index+1}-${d}`;

      const entry=JSON.parse(localStorage.getItem(key));

      const box=document.createElement("div");

      box.innerText=d;

      if(entry){
        box.style.background="#8fffd188";
      }

      if(isFuture(year,index,d)){
        box.style.opacity="0.3";
      }

      mini.appendChild(box);
    }

    card.appendChild(mini);

    wrap.appendChild(card);
  });

  content.appendChild(wrap);
}

const modal=document.getElementById("modal");
const diaryText=document.getElementById("diaryText");
const imageInput=document.getElementById("imageInput");
const gallery=document.getElementById("gallery");

let currentKey="";

function openModal(key,day,month,year){

  currentKey=key;

  modal.style.display="flex";

  document.getElementById("dateTitle").innerText=
  `${day} ${new Date(year,month).toLocaleString('default',{month:'long'})} ${year}`;

  const saved=JSON.parse(localStorage.getItem(key));

  diaryText.value=saved ? saved.text : "";

  gallery.innerHTML="";

  if(saved && saved.images){

    saved.images.forEach(img=>{

      const image=document.createElement("img");

      image.src=img;

      gallery.appendChild(image);
    });
  }
}

function closeModal(){

  modal.style.display="none";
}

function saveDiary(){

  const text=diaryText.value;

  const existing=JSON.parse(localStorage.getItem(currentKey));

  let images=existing && existing.images ? existing.images : [];

  const files=[...imageInput.files];

  if(files.length===0){

    localStorage.setItem(currentKey,JSON.stringify({
      text:text,
      images:images
    }));

    alert("Diary updated ✨");

    render();

    return;
  }

  let loaded=0;

  files.forEach(file=>{

    const reader=new FileReader();

    reader.onload=function(e){

      images.push(e.target.result);

      loaded++;

      if(loaded===files.length){

        localStorage.setItem(currentKey,JSON.stringify({
          text:text,
          images:images
        }));

        alert("Diary saved ✨");

        render();
      }
    };

    reader.readAsDataURL(file);
  });
}

function deleteDiary(){

  if(confirm("Delete this entry?")){

    localStorage.removeItem(currentKey);

    closeModal();

    render();
  }
}

window.onclick=function(e){

  if(e.target===modal){
    closeModal();
  }
}

render();

</script>

</body>
</html>
